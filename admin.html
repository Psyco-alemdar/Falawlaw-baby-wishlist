<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falwlaw Admin</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8efe8;
      color: #5c4b4b;
    }

    /* 🔐 LOGIN */
    .login-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #fffaf7;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
      width: 300px;
    }

    .login-box h2 {
      margin-top: 0;
      color: #c27d9a;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #e3cfc5;
    }

    .login-box button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #d98cab;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    /* 📊 ADMIN */
    .container {
      max-width: 1100px;
      margin: 30px auto;
      background: #fffaf7;
      border-radius: 24px;
      padding: 30px;
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f7d9e5;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login" class="login-container">
  <div class="login-box">
    <h2>Accès Admin</h2>
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="checkPassword()">Entrer</button>
    <div id="login-error" class="error"></div>
  </div>
</div>

<!-- 📊 ADMIN -->
<div id="admin" class="container">
  <h1>Falwlaw Admin</h1>

  <table>
    <thead>
      <tr>
        <th>Nom</th>
        <th>Cadeau</th>
        <th>Montant</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<script>
var PASSWORD = "Sofie2026"; // 🔑 

var SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // garde ta clé complète

function checkPassword() {
  var input = document.getElementById("password").value;

  if (input === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    loadData();
  } else {
    document.getElementById("login-error").innerText = "Mot de passe incorrect ❌";
  }
}

function loadData() {
  fetch(SUPABASE_URL + "/rest/v1/contributions?select=*,gifts(name)&order=created_at.desc", {
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + SUPABASE_ANON_KEY
    }
  })
  .then(res => res.json())
  .then(data => {
    var table = document.getElementById("data");
    table.innerHTML = "";

    data.forEach(row => {
      var tr = document.createElement("tr");

      var date = new Date(row.created_at).toLocaleString();

      tr.innerHTML = `
        <td>${row.contributor_name}</td>
        <td>${row.gifts ? row.gifts.name : ""}</td>
        <td>${row.amount} €</td>
        <td>${date}</td>
      `;

      table.appendChild(tr);
    });
  });
}
</script>

</body>
</html>
