<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falwlaw Admin</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8efe8;
      color: #5c4b4b;
      padding: 30px 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #fffaf7;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 30px;
    }

    h1 {
      margin-top: 0;
      color: #c27d9a;
      font-size: 38px;
      text-align: center;
    }

    p.subtitle {
      text-align: center;
      color: #7a6363;
      margin-bottom: 30px;
      font-size: 18px;
    }

    .summary {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .summary-card {
      flex: 1 1 220px;
      background: #fdf2f6;
      border-radius: 16px;
      padding: 18px;
      text-align: center;
    }

    .summary-card h3 {
      margin: 0 0 10px 0;
      color: #b66f8f;
      font-size: 18px;
    }

    .summary-card p {
      margin: 0;
      font-size: 26px;
      font-weight: bold;
      color: #5c4b4b;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #f0e1d9;
    }

    th {
      background: #f7d9e5;
      color: #7a4f63;
      font-size: 15px;
    }

    tr:hover td {
      background: #fff5f8;
    }

    .loading, .error, .empty {
      text-align: center;
      padding: 24px;
      font-size: 18px;
    }

    .error {
      color: #b00020;
    }

    .back {
      display: inline-block;
      margin-top: 24px;
      text-decoration: none;
      color: #b66f8f;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Falwlaw Admin</h1>
    <p class="subtitle">Suivi des participations à la wishlist</p>

    <div class="summary">
      <div class="summary-card">
        <h3>Total participations</h3>
        <p id="total-contributions">-</p>
      </div>
      <div class="summary-card">
        <h3>Montant total</h3>
        <p id="total-amount">-</p>
      </div>
      <div class="summary-card">
        <h3>Nombre de participants</h3>
        <p id="total-people">-</p>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Cadeau</th>
            <th>Montant</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="contributions-body">
          <tr>
            <td colspan="4" class="loading">Chargement...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <a class="back" href="index.html">← Retour à la wishlist</a>
  </div>

  <script>
    var SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjaWhzcGNzYWRza2V6dWNqcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDUxMzUsImV4cCI6MjA5MjE4MTEzNX0.hVp-qvJWEpNwgwcHv5-jBeS52WC2tocJGavIxkLAY3A";

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(dateString) {
      var d = new Date(dateString);
      if (isNaN(d.getTime())) return dateString;
      var day = String(d.getDate()).padStart(2, "0");
      var month = String(d.getMonth() + 1).padStart(2, "0");
      var year = d.getFullYear();
      var hours = String(d.getHours()).padStart(2, "0");
      var minutes = String(d.getMinutes()).padStart(2, "0");
      return day + "/" + month + "/" + year + " " + hours + ":" + minutes;
    }

    function loadAdmin() {
      var body = document.getElementById("contributions-body");

      fetch(SUPABASE_URL + "/rest/v1/contributions?select=*,gifts(name)&order=created_at.desc", {
        method: "GET",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + SUPABASE_ANON_KEY
        }
      })
      .then(function(response) {
        return response.json().then(function(data) {
          return {
            ok: response.ok,
            data: data
          };
        });
      })
      .then(function(result) {
        if (!result.ok) {
          body.innerHTML = '<tr><td colspan="4" class="error">Erreur : ' + escapeHtml(JSON.stringify(result.data)) + '</td></tr>';
          return;
        }

        var rows = result.data || [];

        if (rows.length === 0) {
          body.innerHTML = '<tr><td colspan="4" class="empty">Aucune participation pour le moment</td></tr>';
          document.getElementById("total-contributions").innerHTML = "0";
          document.getElementById("total-amount").innerHTML = "0 €";
          document.getElementById("total-people").innerHTML = "0";
          return;
        }

        var totalAmount = 0;
        var uniquePeople = {};

        body.innerHTML = "";

        for (var i = 0; i < rows.length; i++) {
          var row = rows[i];
          var tr = document.createElement("tr");

          totalAmount += Number(row.amount || 0);
          uniquePeople[String(row.contributor_name).trim().toLowerCase()] = true;

          var giftName = "";
          if (row.gifts && row.gifts.name) {
            giftName = row.gifts.name;
          } else {
            giftName = "Cadeau inconnu";
          }

          tr.innerHTML =
            "<td>" + escapeHtml(row.contributor_name) + "</td>" +
            "<td>" + escapeHtml(giftName) + "</td>" +
            "<td>" + escapeHtml(String(row.amount)) + " €</td>" +
            "<td>" + escapeHtml(formatDate(row.created_at)) + "</td>";

          body.appendChild(tr);
        }

        document.getElementById("total-contributions").innerHTML = rows.length;
        document.getElementById("total-amount").innerHTML = totalAmount + " €";
        document.getElementById("total-people").innerHTML = Object.keys(uniquePeople).length;
      })
      .catch(function(error) {
        body.innerHTML = '<tr><td colspan="4" class="error">Erreur réseau : ' + escapeHtml(String(error)) + '</td></tr>';
      });
    }

    loadAdmin();
  </script>
</body>
</html>
