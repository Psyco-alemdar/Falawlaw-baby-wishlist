<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Falwlaw Baby</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #fff7f8, #f4e7df);
  color: #5f4b4b;
}

.login, .admin {
  max-width: 1100px;
  margin: 40px auto;
  padding: 20px;
}

.box {
  background: #fffdfb;
  border-radius: 24px;
  padding: 28px;
  box-shadow: 0 14px 35px rgba(180,120,140,0.18);
}

h1 {
  color: #b96f90;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #e2c9d2;
  margin-top: 10px;
  box-sizing: border-box;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 12px;
  background: #d98cab;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.admin {
  display: none;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: white;
  border-radius: 16px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #f0d6df;
  text-align: left;
  vertical-align: top;
}

th {
  background: #f7d9e5;
}

.status-pending {
  color: #b97800;
  font-weight: bold;
}

.status-confirmed {
  color: green;
  font-weight: bold;
}

.message {
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  display: none;
}

.success {
  display: block;
  background: #e8f6e8;
  color: green;
}

.error {
  display: block;
  background: #fdeaea;
  color: #b00020;
}
</style>
</head>

<body>

<div id="login" class="login">
  <div class="box">
    <h1>Accès Admin</h1>
    <input type="password" id="password" placeholder="Mot de passe admin">
    <br><br>
    <button type="button" onclick="checkPassword()">Entrer</button>
    <div id="login-message" class="message"></div>
  </div>
</div>

<div id="admin" class="admin">
  <div class="box">
    <h1>Falwlaw Admin</h1>
    <p>Suivi des participations par virement bancaire</p>

    <div id="admin-message" class="message"></div>

    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Cadeau</th>
          <th>Montant</th>
          <th>Message</th>
          <th>Référence</th>
          <th>Statut</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="7">Chargement...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
var ADMIN_PASSWORD = "falwlaw2026";

var SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjaWhzcGNzYWRza2V6dWNqcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDUxMzUsImV4cCI6MjA5MjE4MTEzNX0.hVp-qvJWEpNwgwcHv5-jBeS52WC2tocJGavIxkLAY3A";

function showMessage(id, text, type) {
  var box = document.getElementById(id);
  box.className = "message " + type;
  box.innerHTML = text;
}

function checkPassword() {
  var pass = document.getElementById("password").value;

  if (pass !== ADMIN_PASSWORD) {
    showMessage("login-message", "Mot de passe incorrect.", "error");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("admin").style.display = "block";
  loadAdmin();
}

function escapeHtml(text) {
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function loadAdmin() {
  var tbody = document.getElementById("rows");
  tbody.innerHTML = '<tr><td colspan="7">Chargement...</td></tr>';

  fetch(SUPABASE_URL + "/rest/v1/contributions?select=*&order=created_at.desc", {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  })
  .then(function(res) {
    return res.json();
  })
  .then(function(contributions) {
    return fetch(SUPABASE_URL + "/rest/v1/gifts?select=id,name", {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    })
    .then(function(res) {
      return res.json();
    })
    .then(function(gifts) {
      var giftsMap = {};

      for (var i = 0; i < gifts.length; i++) {
        giftsMap[gifts[i].id] = gifts[i].name;
      }

      if (!contributions || contributions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">Aucune participation.</td></tr>';
        return;
      }

      tbody.innerHTML = "";

      for (var j = 0; j < contributions.length; j++) {
        var c = contributions[j];
        var giftName = giftsMap[c.gift_id] || "Cadeau inconnu";
        var status = c.status || "confirmed";

        var action = "—";

        if (status === "pending") {
          action = '<button type="button" onclick="confirmContribution(' + c.id + ',' + c.gift_id + ',' + c.amount + ')">✅ Confirmer reçu</button>';
        }

        var tr = document.createElement("tr");

        tr.innerHTML =
          "<td>" + escapeHtml(c.contributor_name) + "</td>" +
          "<td>" + escapeHtml(giftName) + "</td>" +
          "<td>" + escapeHtml(c.amount) + " €</td>" +
          "<td>" + escapeHtml(c.message || "") + "</td>" +
          "<td>" + escapeHtml(c.payment_reference || "") + "</td>" +
          '<td class="' + (status === "pending" ? "status-pending" : "status-confirmed") + '">' +
            (status === "pending" ? "En attente" : "Confirmé") +
          "</td>" +
          "<td>" + action + "</td>";

        tbody.appendChild(tr);
      }
    });
  })
  .catch(function(error) {
    tbody.innerHTML = '<tr><td colspan="7">Erreur de chargement.</td></tr>';
    showMessage("admin-message", "Erreur : " + error.message, "error");
  });
}

function confirmContribution(contributionId, giftId, amount) {
  if (!confirm("Confirmer que ce virement a bien été reçu ?")) {
    return;
  }

  fetch(SUPABASE_URL + "/rest/v1/contributions?id=eq." + contributionId, {
    method: "PATCH",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      status: "confirmed"
    })
  })
  .then(function(res) {
    if (!res.ok) throw new Error("Impossible de confirmer la contribution.");

    return fetch(SUPABASE_URL + "/rest/v1/gifts?id=eq." + giftId + "&select=*", {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });
  })
  .then(function(res) {
    return res.json();
  })
  .then(function(gifts) {
    var gift = gifts[0];

    if (!gift) throw new Error("Cadeau introuvable.");

    var oldAmount = Number(gift.funded_amount || 0);
    var target = Number(gift.target_amount || 0);
    var newAmount = oldAmount + Number(amount);

    return fetch(SUPABASE_URL + "/rest/v1/gifts?id=eq." + giftId, {
      method: "PATCH",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        funded_amount: newAmount,
        is_funded: newAmount >= target
      })
    });
  })
  .then(function(res) {
    if (!res.ok) throw new Error("Impossible de mettre à jour le cadeau.");

    showMessage("admin-message", "Contribution confirmée avec succès ✅", "success");
    loadAdmin();
  })
  .catch(function(error) {
    showMessage("admin-message", "Erreur : " + error.message, "error");
  });
}
</script>

</body>
</html>
