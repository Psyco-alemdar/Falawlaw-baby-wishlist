<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détail du cadeau</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#fff7f8, #f7ede7);
}

.page {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.image {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.content {
  padding: 20px;
}

.progress {
  height: 12px;
  background: #eee;
  border-radius: 10px;
  margin: 10px 0;
}

.fill {
  height: 12px;
  background: #e49ab5;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #d98cab;
  color: white;
  font-weight: bold;
}

.message {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  display: none;
}

.error { background:#fdeaea; color:red; display:block;}
.success { background:#e8f6e8; color:green; display:block;}
</style>
</head>

<body>

<div class="page">
<div class="card">

<img id="gift-image" class="image">

<div class="content">

<h2 id="gift-name">Chargement...</h2>

<p>Prix : <b id="gift-target"></b></p>
<p>Collecté : <b id="gift-funded"></b></p>
<p>Reste : <b id="gift-remaining"></b></p>

<div class="progress">
  <div id="fill" class="fill"></div>
</div>

<input id="name" placeholder="Votre nom">
<input id="amount" type="number" placeholder="Exemple : 100">
<input id="msg" placeholder="Message optionnel">

<button onclick="payer()">Payer maintenant</button>

<div id="message" class="message"></div>

</div>
</div>
</div>

<script>
const SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjaWhzcGNzYWRza2V6dWNqcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDUxMzUsImV4cCI6MjA5MjE4MTEzNX0.hVp-qvJWEpNwgwcHv5-jBeS52WC2tocJGavIxkLAY3A";

let gift = null;

function show(msg,type){
  let box = document.getElementById("message");
  box.className = "message "+type;
  box.innerHTML = msg;
  box.style.display="block";
}

function getId(){
  return new URLSearchParams(window.location.search).get("id");
}

function loadGift(){
  let id = getId();

  fetch(SUPABASE_URL+"/rest/v1/gifts?id=eq."+id,{
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer "+SUPABASE_KEY
    }
  })
  .then(r=>r.json())
  .then(data=>{
    gift=data[0];

    let funded=Number(gift.funded_amount||0);
    let target=Number(gift.target_amount||0);
    let rest=target-funded;

    document.getElementById("gift-name").innerText=gift.name;
    document.getElementById("gift-target").innerText=target+" €";
    document.getElementById("gift-funded").innerText=funded+" €";
    document.getElementById("gift-remaining").innerText=rest+" €";

    document.getElementById("fill").style.width=(funded/target*100)+"%";

    document.getElementById("gift-image").src = gift.image_url || "https://images.pexels.com/photos/459957/pexels-photo-459957.jpeg";
  });
}

function payer(){

  let name=document.getElementById("name").value;
  let amount=Number(document.getElementById("amount").value);

  if(!name) return show("Nom requis","error");
  if(!amount) return show("Montant invalide","error");

  fetch("https://falawlaw-baby-wishlist.vercel.app/api/create-checkout-session",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      amount:amount,
      giftName:gift.name
    })
  })
  .then(r=>r.text())
  .then(t=>{
    try{
      let data=JSON.parse(t);
      window.location.href=data.url;
    }catch{
      show("Erreur serveur : "+t,"error");
    }
  });
}

loadGift();
</script>

</body>
</html>
