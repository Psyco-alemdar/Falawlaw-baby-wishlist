<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détail du cadeau</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #fff7f8, #f7ede7);
  color: #5f4b4b;
}

.page {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.image {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.content {
  padding: 25px;
}

h1 {
  margin: 0 0 15px;
  color: #c884a2;
}

.stats {
  margin: 10px 0;
}

.progress {
  height: 14px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin: 15px 0;
}

.fill {
  height: 14px;
  background: #e49ab5;
}

.form-box {
  margin-top: 20px;
}

label {
  display: block;
  margin-top: 12px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 5px;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #d98cab;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.message {
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  display: none;
}

.success {
  background: #e8f6e8;
  color: green;
}

.error {
  background: #fdeaea;
  color: red;
}
</style>
</head>

<body>

<div class="page">
  <div class="card">
    <img id="gift-image" class="image">

    <div class="content">
      <h1 id="gift-name">Chargement...</h1>

      <div class="stats">Prix : <span id="gift-target"></span></div>
      <div class="stats">Collecté : <span id="gift-funded"></span></div>
      <div class="stats">Reste : <span id="gift-remaining"></span></div>

      <div class="progress">
        <div id="gift-fill" class="fill"></div>
      </div>

      <div id="form-area" class="form-box">
        <label>Votre prénom</label>
        <input id="prenom" placeholder="Ex: Mounir">

        <label>Montant (€)</label>
        <input id="montant" type="number" placeholder="Exemple : 100">

        <label>Message (optionnel)</label>
        <input id="messageInput" placeholder="Ex: Félicitations ❤️">

        <button onclick="payer()">Payer maintenant</button>
      </div>

      <div id="message" class="message"></div>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // laisse comme ça

var currentGift = null;

function showMessage(text, type) {
  var box = document.getElementById("message");
  box.className = "message " + type;
  box.style.display = "block";
  box.innerHTML = text;
}

function getId() {
  return new URLSearchParams(window.location.search).get("id");
}

function getImage(name) {
  var lower = name.toLowerCase();

  if (lower.includes("poussette")) return "https://images.pexels.com/photos/1257110/pexels-photo-1257110.jpeg";
  if (lower.includes("siege")) return "https://images.pexels.com/photos/3933274/pexels-photo-3933274.jpeg";
  if (lower.includes("lit")) return "https://images.pexels.com/photos/3662667/pexels-photo-3662667.jpeg";
  if (lower.includes("tire")) return "https://images.pexels.com/photos/3661470/pexels-photo-3661470.jpeg";
  if (lower.includes("biberon")) return "https://images.pexels.com/photos/3933244/pexels-photo-3933244.jpeg";
  if (lower.includes("babyphone")) return "https://images.pexels.com/photos/459957/pexels-photo-459957.jpeg";

  return "https://images.pexels.com/photos/459957/pexels-photo-459957.jpeg";
}

function loadGift() {
  var id = getId();

  fetch(SUPABASE_URL + "/rest/v1/gifts?id=eq." + id + "&select=*",
  {
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + SUPABASE_ANON_KEY
    }
  })
  .then(res => res.json())
  .then(data => {
    currentGift = data[0];

    var funded = Number(currentGift.funded_amount);
    var target = Number(currentGift.target_amount);
    var remaining = target - funded;
    if (remaining < 0) remaining = 0;

    var percent = (funded / target) * 100;

    document.getElementById("gift-name").innerHTML = currentGift.name;
    document.getElementById("gift-target").innerHTML = target + " €";
    document.getElementById("gift-funded").innerHTML = funded + " €";
    document.getElementById("gift-remaining").innerHTML = remaining + " €";
    document.getElementById("gift-fill").style.width = percent + "%";
    document.getElementById("gift-image").src = currentGift.image_url || getImage(currentGift.name);

    if (funded >= target) {
      document.getElementById("form-area").innerHTML =
        '<div class="success message" style="display:block;">✅ Ce cadeau est déjà financé</div>';
    }
  });
}

function payer() {
  var prenom = document.getElementById("prenom").value;
  var montant = Number(document.getElementById("montant").value);

  if (!prenom || !prenom.trim()) {
    showMessage("Veuillez entrer votre prénom", "error");
    return;
  }

  if (!montant || montant <= 0) {
    showMessage("Montant invalide", "error");
    return;
  }

  fetch("/api/create-checkout-session", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      amount: montant,
      giftName: currentGift.name
    })
  })
  .then(res => res.json())
  .then(data => {
    window.location.href = data.url;
  })
  .catch(err => {
    showMessage("Erreur paiement", "error");
  });
}

loadGift();
</script>

</body>
</html>
