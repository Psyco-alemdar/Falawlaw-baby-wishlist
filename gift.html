<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falwlaw Baby Sophia</title>
</head>

<body>

<script>
const SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
const SUPABASE_KEY = "TON_ANON_KEY";

function getId(){
  return new URLSearchParams(window.location.search).get("id");
}

function payer(){
  let name = document.getElementById("name").value;
  let amount = Number(document.getElementById("amount").value);
  let msg = document.getElementById("msg").value;
  let id = getId();

  let reference = "SOPHIA-" + id + "-" + Date.now();

  fetch(SUPABASE_URL + "/rest/v1/contributions", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify([{
      gift_id: Number(id),
      contributor_name: name,
      amount: amount,
      message: msg,
      status: "pending",
      payment_reference: reference
    }])
  })
  .then(function(){
    window.location.href =
      "payment.html?name=" + encodeURIComponent(name) +
      "&amount=" + amount +
      "&ref=" + reference +
      "&gift=Cadeau";
  });
}
</script>

</body>
</html>
