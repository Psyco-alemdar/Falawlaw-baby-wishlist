<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falwlaw Baby Wishlist</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f5f0;
      text-align: center;
      color: #333;
    }
    h1 {
      margin-top: 40px;
      color: #6b7d6b;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 260px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
    }
    .progress {
      height: 10px;
      background: #eee;
      border-radius: 10px;
      margin: 10px 0;
      overflow: hidden;
    }
    .fill {
      height: 10px;
      background: #8fbc8f;
      border-radius: 10px;
    }
    .error {
      color: red;
      padding: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Falwlaw Baby Wishlist</h1>
<div id="gifts" class="grid">Chargement...</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjaWhzcGNzYWRza2V6dWNqcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDUxMzUsImV4cCI6MjA5MjE4MTEzNX0.hVp-qvJWEpNwgwcHv5-jBeS52WC2tocJGavIxkLAY3A";

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadGifts() {
    const container = document.getElementById("gifts");

    const { data, error } = await client
      .from("gifts")
      .select("*")
      .order("id", { ascending: true });

    if (error) {
      container.innerHTML = '<div class="error">Erreur: ' + error.message + '</div>';
      return;
    }

    if (!data || data.length === 0) {
      container.innerHTML = '<div class="error">Aucun article trouvé</div>';
      return;
    }

    container.innerHTML = "";

    data.forEach(gift => {
      const funded = Number(gift.funded_amount);
      const target = Number(gift.target_amount);
      const remaining = target - funded;
      const percent = Math.min((funded / target) * 100, 100);

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>${gift.name}</h3>
        <p>Prix : ${target} €</p>
        <p>Collecté : ${funded} €</p>
        <p>Reste : ${remaining} €</p>
        <div class="progress">
          <div class="fill" style="width:${percent}%"></div>
        </div>
        ${funded >= target ? '<p>✅ Financé</p>' : '<p>Disponible</p>'}
      `;
      container.appendChild(card);
    });
  }

  loadGifts();
</script>

</body>
</html>
