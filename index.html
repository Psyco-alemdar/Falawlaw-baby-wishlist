<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falwlaw Baby Wishlist</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8efe8;
      color: #5c4b4b;
      text-align: center;
    }

    header {
      padding: 40px 20px 20px;
    }

    h1 {
      margin: 0;
      font-size: 52px;
      color: #c88ea7;
    }

    .subtitle {
      max-width: 800px;
      margin: 20px auto 0;
      font-size: 22px;
      line-height: 1.6;
      color: #7a6363;
      padding: 0 20px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      padding: 40px 20px 60px;
    }

    .card {
      background: #fffaf7;
      border-radius: 20px;
      width: 300px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      overflow: hidden;
      text-align: left;
    }

    .card-image {
      width: 100%;
      height: 210px;
      object-fit: cover;
      background: #f3ddd0;
    }

    .card-content {
      padding: 20px;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 12px;
      color: #b66f8f;
      font-size: 24px;
    }

    .card p {
      margin: 8px 0;
      font-size: 17px;
    }

    .progress {
      height: 12px;
      background: #ead8cf;
      border-radius: 999px;
      overflow: hidden;
      margin: 14px 0;
    }

    .fill {
      height: 12px;
      background: #e8a9c0;
      border-radius: 999px;
    }

    .button {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 18px;
      background: #d98cab;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      text-align: center;
    }

    .button:hover {
      background: #c97c9b;
    }

    .done {
      background: #e8f6e8;
      color: #3b7a3b;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }

    .error {
      color: #b00020;
      font-weight: bold;
      padding: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Falwlaw Baby Wishlist</h1>
    <p class="subtitle">
      Bienvenue sur notre liste de naissance 🤍<br>
      Vous pouvez participer librement au cadeau de votre choix.
    </p>
  </header>

  <div id="gifts" class="grid">Chargement...</div>

  <script>
    var SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjaWhzcGNzYWRza2V6dWNqcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDUxMzUsImV4cCI6MjA5MjE4MTEzNX0.hVp-qvJWEpNwgwcHv5-jBeS52WC2tocJGavIxkLAY3A";

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getGiftImage(name) {
      var lower = name.toLowerCase();

      if (lower.indexOf("poussette") !== -1) {
        return "https://images.pexels.com/photos/1257110/pexels-photo-1257110.jpeg?auto=compress&cs=tinysrgb&w=1200";
      }

      if (lower.indexOf("siège") !== -1 || lower.indexOf("siege") !== -1) {
        return "https://images.pexels.com/photos/3933274/pexels-photo-3933274.jpeg?auto=compress&cs=tinysrgb&w=1200";
      }

      if (lower.indexOf("lit") !== -1) {
        return "https://images.pexels.com/photos/3662667/pexels-photo-3662667.jpeg?auto=compress&cs=tinysrgb&w=1200";
      }

      return "https://images.pexels.com/photos/459957/pexels-photo-459957.jpeg?auto=compress&cs=tinysrgb&w=1200";
    }

    function loadGifts() {
      var container = document.getElementById("gifts");

      fetch(SUPABASE_URL + "/rest/v1/gifts?select=*&order=id.asc", {
        method: "GET",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + SUPABASE_ANON_KEY
        }
      })
      .then(function(response) {
        return response.json().then(function(data) {
          return {
            ok: response.ok,
            data: data
          };
        });
      })
      .then(function(result) {
        if (!result.ok) {
          container.innerHTML = '<div class="error">Erreur : ' + JSON.stringify(result.data) + '</div>';
          return;
        }

        if (!result.data || result.data.length === 0) {
          container.innerHTML = '<div class="error">Aucun article trouvé</div>';
          return;
        }

        container.innerHTML = "";

        for (var i = 0; i < result.data.length; i++) {
          var gift = result.data[i];
          var funded = Number(gift.funded_amount);
          var target = Number(gift.target_amount);
          var remaining = target - funded;
          if (remaining < 0) remaining = 0;

          var percent = 0;
          if (target > 0) {
            percent = (funded / target) * 100;
            if (percent > 100) percent = 100;
          }

          var image = getGiftImage(gift.name);

          var card = document.createElement("div");
          card.className = "card";

          var buttonHtml = "";
          if (funded >= target || gift.is_funded === true) {
            buttonHtml = '<div class="done">✅ Financé</div>';
          } else {
            buttonHtml = '<a class="button" href="gift.html?id=' + gift.id + '">Participer</a>';
          }

          card.innerHTML =
            '<img class="card-image" src="' + image + '" alt="' + escapeHtml(gift.name) + '">' +
            '<div class="card-content">' +
              '<h3>' + escapeHtml(gift.name) + '</h3>' +
              '<p>Prix : <strong>' + target + ' €</strong></p>' +
              '<p>Collecté : <strong>' + funded + ' €</strong></p>' +
              '<p>Reste : <strong>' + remaining + ' €</strong></p>' +
              '<div class="progress"><div class="fill" style="width:' + percent + '%"></div></div>' +
              buttonHtml +
            '</div>';

          container.appendChild(card);
        }
      })
      .catch(function(error) {
        container.innerHTML = '<div class="error">Erreur réseau : ' + error + '</div>';
      });
    }

    loadGifts();
  </script>

</body>
</html>
