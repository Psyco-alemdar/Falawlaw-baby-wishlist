<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falwlaw Baby Wishlist</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f8f5f0;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      color: #6b7d6b;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 260px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .progress {
      height: 10px;
      background: #eee;
      border-radius: 10px;
      margin: 10px 0;
    }

    .fill {
      height: 10px;
      background: #8fbc8f;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #7ea37e;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .done {
      background: #d4edda;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Falwlaw Baby Wishlist</h1>

<div id="gifts" class="grid"></div>

<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjaWhzcGNzYWRza2V6dWNqcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDUxMzUsImV4cCI6MjA5MjE4MTEzNX0.hVp-qvJWEpNwgwcHv5-jBeS52WC2tocJGavIxkLAY3A";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadGifts() {
  const container = document.getElementById("gifts");

  const { data, error } = await supabaseClient
    .from("gifts")
    .select("*")
    .order("id");

  if (error) {
    container.innerHTML = "Erreur : " + error.message;
    return;
  }

  container.innerHTML = "";

  data.forEach(gift => {
    const percent = Math.min((gift.funded_amount / gift.target_amount) * 100, 100);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${gift.name}</h3>
      <p>Prix : ${gift.target_amount} €</p>
      <p>Collecté : ${gift.funded_amount} €</p>
      <p>Reste : ${gift.target_amount - gift.funded_amount} €</p>

      <div class="progress">
        <div class="fill" style="width:${percent}%"></div>
      </div>

      ${
        gift.funded_amount >= gift.target_amount
        ? '<div class="done">✅ Financé</div>'
        : '<button>Participer</button>'
      }
    `;

    container.appendChild(card);
  });
}

loadGifts();
</script>

</body>
</html>
