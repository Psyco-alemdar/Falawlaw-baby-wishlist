<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falwlaw Baby Wishlist</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f5f0;
      color: #333;
    }

    header {
      text-align: center;
      padding: 50px 20px 30px;
      background: #ffffff;
      border-bottom: 1px solid #e8e1d8;
    }

    header h1 {
      margin: 0;
      font-size: 38px;
      color: #6b7d6b;
    }

    header p {
      max-width: 700px;
      margin: 15px auto 0;
      font-size: 18px;
      line-height: 1.6;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 24px;
      color: #4f614f;
    }

    .price,
    .funded,
    .remaining,
    .status {
      margin: 8px 0;
      font-size: 16px;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: #eee6dc;
      border-radius: 999px;
      overflow: hidden;
      margin: 16px 0 10px;
    }

    .progress-fill {
      height: 100%;
      background: #9abb9a;
      border-radius: 999px;
    }

    .button {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 20px;
      background: #7ea37e;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .button:hover {
      background: #6d926d;
    }

    .funded-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 16px;
      background: #e7f5e7;
      color: #2f6b2f;
      border-radius: 10px;
      font-weight: bold;
    }

    .loading {
      text-align: center;
      font-size: 18px;
      padding: 30px;
    }

    .error {
      text-align: center;
      color: #b00020;
      font-size: 18px;
      padding: 30px;
    }

    footer {
      text-align: center;
      padding: 30px 20px 50px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Falwlaw Baby Wishlist</h1>
    <p>
      Bienvenue sur notre liste de naissance. Merci de faire partie de cette belle aventure avec nous.
      Vous pouvez participer librement au cadeau de votre choix avec le montant que vous souhaitez.
    </p>
  </header>

  <div class="container">
    <div id="gift-list" class="grid">
      <div class="loading">Chargement des cadeaux...</div>
    </div>
  </div>

  <footer>
    Falwlaw Baby Wishlist © 2026
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjaWhzcGNzYWRza2V6dWNqcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDUxMzUsImV4cCI6MjA5MjE4MTEzNX0.hVp-qvJWEpNwgwcHv5-jBeS52WC2tocJGavIxkLAY3A";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function formatAmount(value) {
      return Number(value).toFixed(2).replace(".00", "") + " €";
    }

    function getGiftLink(name, isFunded) {
      if (isFunded) return "";

      if (name.toLowerCase() === "poussette") return "poussette.html";
      if (name.toLowerCase() === "siège auto" || name.toLowerCase() === "siege auto") return "siege-auto.html";

      return "#";
    }

    function renderGiftCard(gift) {
      const funded = Number(gift.funded_amount);
      const target = Number(gift.target_amount);
      const remaining = Math.max(target - funded, 0);
      const percent = target > 0 ? Math.min((funded / target) * 100, 100) : 0;
      const isFunded = gift.is_funded || funded >= target;
      const link = getGiftLink(gift.name, isFunded);

      return `
        <div class="card">
          <h2>${gift.name}</h2>
          <p class="price">Prix total : <strong>${formatAmount(target)}</strong></p>
          <p class="funded">Collecté : <strong>${formatAmount(funded)}</strong></p>
          <p class="remaining">Reste : <strong>${formatAmount(remaining)}</strong></p>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${percent}%;"></div>
          </div>
          <p class="status">Progression : <strong>${percent.toFixed(0)}%</strong></p>
          ${
            isFunded
              ? '<div class="funded-badge">✅ Financé</div>'
              : <a href="${link}" class="button">Participer</a>
          }
        </div>
      `;
    }

    async function loadGifts() {
      const giftList = document.getElementById("gift-list");

      const { data, error } = await supabaseClient
        .from("gifts")
        .select("*")
        .order("id", { ascending: true });

      if (error) {
        giftList.innerHTML = <div class="error">Erreur de chargement : ${error.message}</div>;
        return;
      }

      if (!data || data.length === 0) {
        giftList.innerHTML = <div class="loading">Aucun cadeau trouvé.</div>;
        return;
      }

      giftList.innerHTML = data.map(renderGiftCard).join("");
    }

    loadGifts();
  </script>
</body>
</html>
