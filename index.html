<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falwlaw Baby Wishlist</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f5f0;
      text-align: center;
      color: #333;
    }

    h1 {
      margin-top: 40px;
      color: #6b7d6b;
    }

    p.subtitle {
      max-width: 700px;
      margin: 10px auto 30px;
      line-height: 1.6;
      padding: 0 20px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 280px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
    }

    .progress {
      height: 10px;
      background: #eee;
      border-radius: 10px;
      margin: 10px 0;
      overflow: hidden;
    }

    .fill {
      height: 10px;
      background: #8fbc8f;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #7ea37e;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 15px;
    }

    .done {
      background: #d4edda;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
      color: #2f6b2f;
    }

    .error {
      color: #b00020;
      font-weight: bold;
      padding: 20px;
    }
  </style>
</head>
<body>

  <h1>Falwlaw Baby Wishlist</h1>
  <p class="subtitle">
    Bienvenue sur notre liste de naissance ❤️ Vous pouvez participer librement au cadeau de votre choix.
  </p>

  <div id="gifts" class="grid">Chargement...</div>

  <script>
    var SUPABASE_URL = "https://rcihspcsadskezucjpdp.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjaWhzcGNzYWRza2V6dWNqcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDUxMzUsImV4cCI6MjA5MjE4MTEzNX0.hVp-qvJWEpNwgwcHv5-jBeS52WC2tocJGavIxkLAY3A";

    function loadGifts() {
      var container = document.getElementById("gifts");

      fetch(SUPABASE_URL + "/rest/v1/gifts?select=*&order=id.asc", {
        method: "GET",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + SUPABASE_ANON_KEY
        }
      })
      .then(function(response) {
        return response.json().then(function(data) {
          return {
            ok: response.ok,
            status: response.status,
            data: data
          };
        });
      })
      .then(function(result) {
        if (!result.ok) {
          container.innerHTML = '<div class="error">Erreur: ' + JSON.stringify(result.data) + '</div>';
          return;
        }

        if (!result.data || result.data.length === 0) {
          container.innerHTML = '<div class="error">Aucun article trouvé</div>';
          return;
        }

        container.innerHTML = "";

        for (var i = 0; i < result.data.length; i++) {
          var gift = result.data[i];
          var funded = Number(gift.funded_amount);
          var target = Number(gift.target_amount);
          var remaining = target - funded;
          if (remaining < 0) remaining = 0;

          var percent = 0;
          if (target > 0) {
            percent = (funded / target) * 100;
            if (percent > 100) percent = 100;
          }

          var card = document.createElement("div");
          card.className = "card";

          var buttonHtml = "";
          if (funded >= target || gift.is_funded === true) {
            buttonHtml = '<div class="done">✅ Financé</div>';
          } else {
            buttonHtml = '<button>Participer</button>';
          }

          card.innerHTML =
            "<h3>" + gift.name + "</h3>" +
            "<p>Prix : " + target + " €</p>" +
            "<p>Collecté : " + funded + " €</p>" +
            "<p>Reste : " + remaining + " €</p>" +
            '<div class="progress"><div class="fill" style="width:' + percent + '%"></div></div>' +
            buttonHtml;

          container.appendChild(card);
        }
      })
      .catch(function(error) {
        container.innerHTML = '<div class="error">Erreur réseau: ' + error + '</div>';
      });
    }

    loadGifts();
  </script>

</body>
</html>
