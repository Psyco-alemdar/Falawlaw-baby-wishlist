<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - Sophia 🤍</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #f7fcf9, #eef7f1);
  text-align: center;
  color: #3d5c4a;
}

.container {
  max-width: 620px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 26px;
  padding: 32px;
  box-shadow: 0 12px 30px rgba(100, 160, 120, 0.12);
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* ❤️ cœur /
.heart {
  font-size: 40px;
  animation: beat 1.8s infinite;
}
@keyframes beat {
  0%{transform:scale(1);}
  25%{transform:scale(1.1);}
  50%{transform:scale(1);}
  75%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

h1 { color:#4f8f6a; }

.subtitle {
  color:#6f8f7c;
  margin-bottom:20px;
}

/ ⚡ Revolut /
.revolut {
  background:#111;
  color:white;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
  cursor:pointer;
}

/ 💳 info /
.info-box {
  background:#f5fbf7;
  border-radius:18px;
  padding:18px;
  margin-top:20px;
}

.info { margin:10px 0; }

.bold { font-weight:bold; color:#4f8f6a; }

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#6fbf93;
  color:white;
  cursor:pointer;
}

.secondary {
  background:#e6f4ec;
  color:#3d5c4a;
}

/ QR /
.qr-section {
  margin-top:20px;
}

.qr {
  width:200px;
}

/ 🎉 confetti /
.confetti {
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall 3s linear forwards;
}
@keyframes fall {
  to {transform:translateY(110vh) rotate(360deg); opacity:0;}
}

.back {
  display:block;
  margin-top:20px;
  color:#4f8f6a;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="heart">💚</div>

<h1 id="title">Merci 🤍</h1>

<p class="subtitle">
Votre participation pour Sophia est enregistrée.<br>
Finalisez votre paiement ci-dessous.
</p>

<!-- ⚡ Revolut -->
<div class="revolut" onclick="payerRevolut()">
⚡ Payer avec Revolut
</div>

<!-- 💳 IBAN -->
<div class="info-box">
<div class="info">Montant : <span id="amount" class="bold"></span></div>
<div class="info">IBAN : <span id="iban" class="bold"></span></div>
<div class="info">Référence : <span id="ref" class="bold"></span></div>

<button onclick="copyText(IBAN)">Copier IBAN</button>
<button onclick="copyText(ref)">Copier référence</button>
</div>

<!-- QR -->
<div class="qr-section">
<p><b>QR code virement bancaire</b></p>
<img id="qr" class="qr">
</div>

<!-- ✅ paiement effectué -->
<button class="secondary" onclick="paymentDone()">
✅ J’ai effectué le paiement
</button>

<a class="back" href="index.html">← Retour</a>

</div>
</div>

<script>
const IBAN = "LT07 3250 0771 5674 6415";
const REVOLUT = "https://revolut.me/mounirfvr8";

const params = new URLSearchParams(window.location.search);

const name = params.get("name") || "";
const amount = params.get("amount") || "0";
const ref = params.get("ref") || "";

const nameFormatted = name ? name.charAt(0).toUpperCase()+name.slice(1) : "";

document.getElementById("title").innerHTML =
nameFormatted ? "Merci " + nameFormatted + " 🤍" : "Merci 🤍";

document.getElementById("amount").innerText = amount + " €";
document.getElementById("iban").innerText = IBAN;
document.getElementById("ref").innerText = ref;

/ Revolut /
function payerRevolut(){
alert("Ajoute cette référence dans Revolut : " + ref);
window.open(REVOLUT,"_blank");
}

/ copier /
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copié ✅");
}

/ QR /
let qrData =
"BCD\n002\n1\nSCT\n\nMounir Akkari\n" +
IBAN.replaceAll(" ","") + "\n" +
"EUR"+parseFloat(amount).toFixed(2)+"\n\n\n"+ref;

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(qrData);

/ bouton paiement effectué /
function paymentDone(){
alert("Merci 🤍 Nous vérifierons votre paiement bientôt.");
}

/ confetti */
function confetti(){
let symbols=["💚","🤍","✨"];
for(let i=0;i<20;i++){
let c=document.createElement("div");
c.className="confetti";
c.innerHTML=symbols[Math.floor(Math.random()*3)];
c.style.left=Math.random()*100+"vw";
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}
confetti();
</script>

</body>
</html>
