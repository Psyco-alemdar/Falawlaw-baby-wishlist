<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - Sophia 🤍</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#fff7f8,#f4e7df);
  text-align: center;
  color: #5f4b4b;
}

.container {
  max-width: 600px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 24px;
  padding: 30px;
  box-shadow: 0 15px 40px rgba(180,120,140,0.2);
}

h1 {
  color: #b96f90;
}

.subtitle {
  margin-bottom: 20px;
  color: #7b6666;
  line-height: 1.6;
}

.heart {
  font-size: 40px;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.info {
  margin: 12px 0;
  font-size: 18px;
}

.bold {
  font-weight: bold;
  color: #b96f90;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  background: #d98cab;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.secondary {
  background: #e8c4d1;
  color: #6b4b4b;
}

.qr {
  width: 200px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="heart">❤️</div>

    <h1 id="title">Merci 🤍</h1>

    <p class="subtitle" id="subtitle"></p>

    <div class="info">
      Montant : <span id="amount" class="bold"></span>
    </div>

    <div class="info">
      IBAN : <span id="iban" class="bold"></span>
    </div>

    <button onclick="copyText(IBAN)">Copier IBAN</button>

    <div class="info">
      Référence : <span id="ref" class="bold"></span>
    </div>

    <button onclick="copyText(ref)">Copier référence</button>

    <button class="secondary" onclick="copyAll()">Copier toutes les informations</button>

    <button class="secondary" onclick="share()">Partager sur WhatsApp</button>

    <img id="qr" class="qr">

  </div>
</div>

<script>
const IBAN = "LT07 3250 0771 5674 6415";
const RECEIVER = "Mounir Akkari";

// récupérer données URL
const params = new URLSearchParams(window.location.search);

const name = params.get("name") || "🤍";
const amount = params.get("amount") || "0";
const ref = params.get("ref") || "";
const gift = params.get("gift") || "";

// personnalisation
document.getElementById("title").innerHTML =
  "Merci " + name + " 🤍";

document.getElementById("subtitle").innerHTML =
  "Votre attention pour Sophia nous touche énormément.<br>" +
  "Merci d’accompagner ses premiers moments avec autant de douceur.";

document.getElementById("amount").innerText = amount + " €";
document.getElementById("iban").innerText = IBAN;
document.getElementById("ref").innerText = ref;

// copier simple
function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copié ✅");
}

// copier complet
function copyAll(){
  let txt =
    "Falwlaw Baby Sophia 🤍\n" +
    "Cadeau: " + gift + "\n" +
    "Montant: " + amount + " €\n" +
    "Bénéficiaire: " + RECEIVER + "\n" +
    "IBAN: " + IBAN + "\n" +
    "Référence: " + ref;

  navigator.clipboard.writeText(txt);
  alert("Toutes les infos copiées ✅");
}

// partager WhatsApp
function share(){
  let txt =
    "Participation pour Sophia 🤍\n" +
    "Montant: " + amount + " €\n" +
    "IBAN: " + IBAN + "\n" +
    "Référence: " + ref;

  window.open("https://wa.me/?text=" + encodeURIComponent(txt));
}

// QR Code SEPA
let qrData =
  "BCD\n002\n1\nSCT\n\n" +
  RECEIVER + "\n" +
  IBAN.replaceAll(" ","") + "\n" +
  "EUR" + parseFloat(amount).toFixed(2) + "\n\n\n" +
  ref;

document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(qrData);
</script>

</body>
</html>
