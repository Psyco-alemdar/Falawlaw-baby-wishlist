<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contribution - Poussette</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f5f0;
      color: #333;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      color: #4f614f;
      margin-top: 0;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      margin-top: 24px;
      padding: 14px 20px;
      background: #7ea37e;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #6d926d;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #6d926d;
      text-decoration: none;
      font-weight: bold;
    }

    .info {
      background: #f3f7f3;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contribution pour la poussette</h1>
    <p>Merci de participer à notre wishlist ❤️</p>

    <div class="info">
      <p><strong>Cadeau :</strong> Poussette</p>
      <p><strong>Prix total :</strong> 800 €</p>
      <p><strong>Collecté :</strong> 200 €</p>
      <p><strong>Reste :</strong> 600 €</p>
    </div>

    <form>
      <label for="name">Votre prénom</label>
      <input type="text" id="name" placeholder="Entrez votre prénom">

      <label for="amount">Montant à offrir (€)</label>
      <input type="number" id="amount" placeholder="Exemple : 50">

      <button type="submit">Continuer</button>
    </form>

    <a class="back-link" href="index.html">← Retour à la wishlist</a>
  </div>
</body>
</html>
