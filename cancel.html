<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci - Falwlaw Baby</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff7f8, #f4e7df);
      color: #5f4b4b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 650px;
      background: #fffdfb;
      padding: 45px 30px;
      border-radius: 28px;
      box-shadow: 0 14px 35px rgba(180, 120, 140, 0.18);
    }

    .heart {
      font-size: 48px;
      margin-bottom: 18px;
    }

    h1 {
      color: #b96f90;
      font-size: 38px;
      margin: 0 0 18px;
    }

    p {
      font-size: 19px;
      line-height: 1.7;
      color: #7b6666;
    }

    a {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 24px;
      background: #d98cab;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="heart">🤍</div>
    <h1>Merci beaucoup</h1>
    <p>
      Votre participation a bien été reçue.<br>
      Merci pour votre générosité, votre amour et votre présence dans cette belle aventure.
    </p>
    <a href="index.html">Retour à la wishlist</a>
  </div>
</body>
</html>
